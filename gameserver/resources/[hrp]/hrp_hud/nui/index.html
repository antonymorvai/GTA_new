<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="clock">09:00</div>
    <div id="hud">
        <div class="bar-row" id="row-health"><span class="icon">❤</span><div class="bar"><div class="fill health" id="bar-health"></div></div></div>
        <div class="bar-row" id="row-armor"><span class="icon">🛡</span><div class="bar"><div class="fill armor" id="bar-armor"></div></div></div>
        <div class="bar-row" id="row-hunger"><span class="icon">🍞</span><div class="bar"><div class="fill hunger" id="bar-hunger"></div></div></div>
        <div class="bar-row" id="row-thirst"><span class="icon">💧</span><div class="bar"><div class="fill thirst" id="bar-thirst"></div></div></div>
        <div class="bar-row hidden" id="row-fuel"><span class="icon">⛽</span><div class="bar"><div class="fill fuel" id="bar-fuel"></div></div></div>
        <div id="speed" class="hidden">0 <small>km/h</small></div>
    </div>
    <script src="app.js"></script>
</body>
</html>
