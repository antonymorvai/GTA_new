# ---------------------------------------------------------------------------
# HardcoreRP – server.cfg
# Secrets kommen aus der Umgebung (Docker), nicht aus dieser Datei.
# ---------------------------------------------------------------------------

endpoint_add_tcp "0.0.0.0:30120"
endpoint_add_udp "0.0.0.0:30120"

sv_hostname "${FIVEM_SERVER_NAME}"
sv_maxclients ${FIVEM_MAX_CLIENTS}
sv_licenseKey ${FIVEM_LICENSE_KEY}
sv_enforceGameBuild ${FIVEM_GAME_BUILD}

# --- OneSync (128+ Slots, Entity-Streaming) ---
set onesync on

# --- Sicherheit (server-autoritativ) ---
sv_scriptHookAllowed 0
# Entity-Lockdown-Basis: Kontrollanfragen filtern
sv_filterRequestControl 4
sv_requestParanoia 1
# FiveM-interne Rate-Limiter (zusätzlich zum Framework-Rate-Limit)
set rateLimiter_stateBag_rate 75
set rateLimiter_stateBag_burst 125
set rateLimiter_netEvent_rate 100
set rateLimiter_netEvent_burst 150

# --- Datenbank (oxmysql) ---
set mysql_connection_string "mysql://${MARIADB_USER}:${MARIADB_PASSWORD}@mariadb:3306/${MARIADB_DATABASE}?charset=utf8mb4"

# --- HardcoreRP Framework ---
set hrp_server_id "main"
set hrp_ingest_url "http://backend:3001/v1/ingest/events"
set hrp_ingest_token "${INGEST_TOKEN}"
set hrp_position_interval 5000
set hrp_whitelist_enforce 1
set hrp_character_slots 3
set hrp_character_save_interval 60000
set hrp_starter_cash 50000
set hrp_max_carry_grams 30000

# --- Ressourcen ---
ensure oxmysql
ensure chat
ensure spawnmanager
ensure sessionmanager
ensure baseevents
ensure hrp_logger
ensure hrp_core
ensure hrp_characters
ensure hrp_inventory
ensure hrp_economy
ensure hrp_jobs
ensure hrp_banking
ensure hrp_vehicles
ensure hrp_phone
ensure hrp_medical
ensure hrp_police
ensure hrp_justice
ensure hrp_mechanic
ensure hrp_skills
ensure hrp_resources
ensure hrp_territories
ensure hrp_drugs
ensure hrp_properties
ensure hrp_companies
ensure hrp_director
ensure hrp_anticheat
ensure hrp_hud
ensure hrp_interact
ensure hrp_weapons
ensure hrp_crafting
ensure hrp_weather
ensure hrp_logistics
ensure hrp_voice
ensure hrp_news

# --- Tags/Locale ---
sets tags "roleplay,hardcore,deutsch"
sets locale "de-DE"
