name: hardcorerp

# Netz-Topologie:
#  - internal: DBs, Redis, Backend-Ingest. NICHT von außen erreichbar.
#  - edge:     Reverse Proxy (HTTPS) -> Backend/Web.
# Der Gameserver spricht mit dem Backend ausschließlich über "internal".

networks:
  internal:
    driver: bridge
  edge:
    driver: bridge

volumes:
  mariadb-data:
  logstore-data:
  redis-data:
  caddy-data:
  fivem-txdata:

services:
  mariadb:
    image: mariadb:11.4
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${MARIADB_DATABASE}
      MARIADB_USER: ${MARIADB_USER}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
      TZ: ${TZ}
    # Binlog aktiv -> inkrementelle Backups & Point-in-Time-Restore
    command: >
      --log-bin=mysql-bin
      --binlog-format=ROW
      --expire-logs-days=7
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    volumes:
      - mariadb-data:/var/lib/mysql
      - ./database/migrations:/migrations:ro
    networks: [internal]
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      retries: 10

  logstore:
    image: timescale/timescaledb:latest-pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${LOGSTORE_DB}
      POSTGRES_USER: ${LOGSTORE_USER}
      POSTGRES_PASSWORD: ${LOGSTORE_PASSWORD}
      TZ: ${TZ}
    volumes:
      - logstore-data:/var/lib/postgresql/data
      - ./database/logstore:/migrations:ro
    networks: [internal]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${LOGSTORE_USER} -d ${LOGSTORE_DB}"]
      interval: 10s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --maxmemory-policy noeviction
    volumes:
      - redis-data:/data
    networks: [internal]
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} ping | grep PONG"]
      interval: 10s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: ${BACKEND_PORT}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      LOGSTORE_URL: postgres://${LOGSTORE_USER}:${LOGSTORE_PASSWORD}@logstore:5432/${LOGSTORE_DB}
      GAMEDB_URL: mysql://${MARIADB_USER}:${MARIADB_PASSWORD}@mariadb:3306/${MARIADB_DATABASE}
      INGEST_TOKEN: ${INGEST_TOKEN}
      LOG_RETENTION_DAYS: ${LOG_RETENTION_DAYS}
      POSITION_RETENTION_DAYS: ${POSITION_RETENTION_DAYS}
      TZ: ${TZ}
    depends_on:
      redis: { condition: service_healthy }
      logstore: { condition: service_healthy }
      mariadb: { condition: service_healthy }
    networks: [internal, edge]

  proxy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./proxy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
    networks: [edge]
    depends_on: [backend]

  fivem:
    build: ./gameserver
    restart: unless-stopped
    profiles: [game]
    environment:
      FIVEM_LICENSE_KEY: ${FIVEM_LICENSE_KEY}
      FIVEM_SERVER_NAME: ${FIVEM_SERVER_NAME}
      FIVEM_MAX_CLIENTS: ${FIVEM_MAX_CLIENTS}
      FIVEM_GAME_BUILD: ${FIVEM_GAME_BUILD}
      MARIADB_USER: ${MARIADB_USER}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
      MARIADB_DATABASE: ${MARIADB_DATABASE}
      INGEST_TOKEN: ${INGEST_TOKEN}
      TZ: ${TZ}
    ports:
      - "30120:30120"       # Spiel
      - "30120:30120/udp"
      - "40120:40120"       # txAdmin (per Firewall/VPN absichern!)
    volumes:
      - ./gameserver/resources:/opt/cfx/resources
      - ./gameserver/server.cfg:/opt/cfx/server.cfg:ro
      - fivem-txdata:/opt/cfx/txData
    depends_on:
      mariadb: { condition: service_healthy }
      backend: { condition: service_started }
    networks: [internal]

  backup:
    build: ./ops/backup
    restart: unless-stopped
    environment:
      MARIADB_HOST: mariadb
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${MARIADB_DATABASE}
      LOGSTORE_HOST: logstore
      LOGSTORE_DB: ${LOGSTORE_DB}
      LOGSTORE_USER: ${LOGSTORE_USER}
      PGPASSWORD: ${LOGSTORE_PASSWORD}
      BACKUP_FULL_CRON: ${BACKUP_FULL_CRON}
      BACKUP_INCR_CRON: ${BACKUP_INCR_CRON}
      TZ: ${TZ}
    volumes:
      - ./backups:/backups
    depends_on:
      mariadb: { condition: service_healthy }
      logstore: { condition: service_healthy }
    networks: [internal]
